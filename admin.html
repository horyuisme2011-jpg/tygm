<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔒 小編後台管理系統 | 匿名光中 2.0</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* 後台主卡片 */
        .admin-login-card {
            max-width: 420px;
            width: 100%;
            background: #ffffff;
            padding: 40px 35px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
            box-sizing: border-box;
            border-top: 6px solid #4a90e2;
            position: relative;
            overflow: hidden;
        }

        /* 各個面板 */
        .admin-panel {
            display: none;
        }
        .admin-panel.active {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .admin-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .admin-header h1 {
            color: #4a90e2;
            font-size: 26px;
            margin: 0 0 8px 0;
        }

        .admin-header p {
            color: #777;
            font-size: 14px;
            margin: 0;
        }

        /* 網頁內嵌式提示欄 */
        .alert-box {
            padding: 12px 15px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 20px;
            display: none; 
            line-height: 1.5;
        }
        .alert-box.success {
            display: block;
            background-color: #e6f4ea;
            color: #137333;
            border-left: 4px solid #1e8e3e;
        }
        .alert-box.danger {
            display: block;
            background-color: #fce8e6;
            color: #c5221f;
            border-left: 4px solid #d93025;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 14px;
            color: #444;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 15px;
            transition: all 0.3s ease;
            background-color: #fafafa;
        }

        input:focus {
            border-color: #4a90e2;
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.15);
            outline: none;
        }

        /* 按鈕風格 */
        .admin-btn {
            width: 100%;
            background-color: #4a90e2;
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 5px;
            box-shadow: 0 4px 10px rgba(74, 144, 226, 0.2);
        }
        .admin-btn:hover { background-color: #357abd; }
        .admin-btn:active { transform: scale(0.98); }
        .admin-btn:disabled { background-color: #cbd5e1; cursor: not-allowed; box-shadow: none; }

        /* 連結樣式 */
        .admin-sub-links {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            font-size: 13px;
        }
        .admin-sub-links a {
            color: #4a90e2;
            text-decoration: none;
            cursor: pointer;
        }
        .admin-sub-links a:hover {
            text-decoration: underline;
        }

        .back-to-home {
            text-align: center;
            margin-top: 30px;
            font-size: 14px;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }
        .back-to-home a {
            color: #666;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .back-to-home a:hover { color: #4a90e2; }

        @media (max-width: 480px) {
            body { padding: 15px; }
            .admin-login-card { padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <div class="admin-login-card">

        <div class="admin-panel active" id="panelLogin">
            <div class="admin-header">
                <h1>🔒 小編管理後台</h1>
                <p>請輸入管理員憑證以進入審核系統</p>
            </div>

            <div class="alert-box" id="loginAlert"></div>

            <form id="adminLoginForm">
                <div class="form-group">
                    <label>👤 管理員帳號</label>
                    <input type="text" id="adminUser" placeholder="請輸入管理帳號" required>
                </div>
                <div class="form-group">
                    <label>🔑 安全密碼</label>
                    <input type="password" id="adminPass" placeholder="請輸入安全密碼" required>
                </div>
                <button type="submit" class="admin-btn" id="loginSubmitBtn">進入管理系統</button>
            </form>

            <div class="admin-sub-links">
                <a onclick="switchPanel('panelForgot')">❓ 忘記後台密碼</a>
                <span style="color:#ccc;">|</span>
                <a href="index.html">🌐 回投稿首頁</a>
            </div>
        </div>

        <div class="admin-panel" id="panelForgot">
            <div class="admin-header">
                <h1>❓ 重設管理密碼</h1>
                <p>請驗證管理員繫結的安全信箱</p>
            </div>

            <div class="alert-box" id="forgotAlert"></div>

            <form id="adminForgotForm">
                <div class="form-group">
                    <label>👤 您的管理員帳號</label>
                    <input type="text" id="forgotAdminUser" placeholder="請輸入要找回密碼的帳號" required>
                </div>
                <div class="form-group">
                    <label>📧 繫結的管理信箱</label>
                    <input type="email" id="forgotAdminEmail" placeholder="請輸入該帳號繫結的 Email" required>
                </div>
                <button type="button" class="admin-btn" style="background-color: #5cb85c; box-shadow: 0 4px 10px rgba(92,184,92,0.2);" onclick="sendAdminCode()">發送驗證重設請求</button>
                
                <div class="form-group" style="margin-top: 15px;">
                    <label>系統安全核對狀態</label>
                    <input type="text" id="adminVerifyCode" placeholder="此功能暫作靜態展示" disabled value="Firebase 系統自動重設功能準備中">
                </div>
                <button type="submit" class="admin-btn" disabled style="background-color: #cbd5e1; cursor: not-allowed;">驗證並重設</button>
            </form>

            <div class="admin-sub-links" style="justify-content: center;">
                <a onclick="switchPanel('panelLogin')">⬅️ 返回管理員登入</a>
            </div>
        </div>

        <div class="back-to-home">
            <a href="index.html">🏫 離開後台，回到光中匿名首頁</a>
        </div>
    </div>

    <script>
        // 📢 --- Firebase SDK 核心設定列 ---
        const firebaseConfig = {
            apiKey: "AIzaSyCENccafho6fKD0IefzsQPiXjAq0tpk3NU",
            authDomain: "gmservice-80d0d.firebaseapp.com",
            databaseURL: "https://gmservice-80d0d-default-rtdb.firebaseio.com",
            projectId: "gmservice-80d0d",
            storageBucket: "gmservice-80d0d.firebasestorage.app",
            messagingSenderId: "776618303417",
            appId: "1:776618303417:web:7e5e0a4eff964413a2a068"
        };
        
        // 初始化 Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 💡 【核心邏輯：進入頁面先檢查是否有 admin 帳號，沒有就立刻自動創建】
        function checkAndCreateDefaultAdmin() {
            db.ref('admin_users/admin').once('value')
                .then(snapshot => {
                    if (!snapshot.exists()) {
                        console.log("🔍 偵測到雲端資料庫尚未建立創始帳號，正在自動為您建立...");
                        // 建立 帳號:admin, 密碼:adminpass, 最高權限, 無電郵
                        db.ref('admin_users/admin').set({
                            adminPass: "adminpass",
                            nickname: "創始大編",
                            email: "無",
                            level: "最高權限管理員"
                        }).then(() => {
                            console.log("✅ 創始管理員(admin/adminpass)已成功初始化寫入雲端！");
                        }).catch(err => {
                            console.error("❌ 初始化創始帳號失敗，請確認 Firebase Rules 規則：", err);
                        });
                    } else {
                        console.log("🔍 雲端已存在管理員帳號，準備就緒。");
                    }
                })
                .catch(err => {
                    console.error("❌ 連線 Firebase 檢查失敗，請確認資料庫 Rules 的 admin_users 是否開啟讀寫權限：", err);
                });
        }

        // 執行初始化檢查
        window.onload = function() {
            checkAndCreateDefaultAdmin();
        };

        // 切換面板控制 (登入 <-> 忘記密碼)
        function switchPanel(panelId) {
            document.querySelectorAll('.admin-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.alert-box').forEach(b => b.style.display = 'none');
            document.getElementById(panelId).classList.add('active');
        }

        // 🚀 處理【管理員登入 - 連動 Firebase 雲端比對】
        document.getElementById('adminLoginForm').addEventListener('submit', function(event) {
            event.preventDefault();
            
            const inputUser = document.getElementById('adminUser').value.trim();
            const inputPass = document.getElementById('adminPass').value;
            const alertBox = document.getElementById('loginAlert');
            const submitBtn = document.getElementById('loginSubmitBtn');

            // 特殊字元防呆
            if (/[.#$\[\]]/.test(inputUser)) {
                alertBox.className = "alert-box danger";
                alertBox.innerHTML = "❌ <b>登入失敗：</b> 帳號格式不正確，包含非法字元。";
                return;
            }

            // 按鈕進入讀取狀態
            submitBtn.disabled = true;
            submitBtn.innerText = "正在連線雲端安全驗證...";

            // 🔍 直接向 Firebase 的 admin_users/【輸入帳號】 節點撈取資料
            db.ref('admin_users/' + inputUser).once('value')
                .then(snapshot => {
                    if (snapshot.exists()) {
                        const userData = snapshot.val();
                        
                        // 安全精準比對密碼
                        if (inputPass === userData.adminPass) {
                            
                            alertBox.className = "alert-box success";
                            alertBox.innerHTML = `🎉 <b>驗證成功！</b> 歡迎回來，${userData.nickname || inputUser} 小編。<br>正在分發安全憑證...`;
                            
                            // ✨ 【發放 Session 憑證與權限控制核心標籤】
                            sessionStorage.setItem('adminToken', 'true');
                            sessionStorage.setItem('adminUser', inputUser); 
                            sessionStorage.setItem('adminLevel', userData.level || '一般審核小編'); // 💡 將雲端的級別寫入，傳給控制台

                            // 延遲 0.8 秒滑順跳轉至後台主控台
                            setTimeout(() => {
                                window.location.href = 'admincenter.html';
                            }, 800);

                        } else {
                            // 密碼不對
                            alertBox.className = "alert-box danger";
                            alertBox.innerHTML = "❌ <b>登入失敗：</b> 管理員安全密碼錯誤。";
                            submitBtn.disabled = false;
                            submitBtn.innerText = "進入管理系統";
                        }
                    } else {
                        // 帳號不存在
                        alertBox.className = "alert-box danger";
                        alertBox.innerHTML = "❌ <b>登入失敗：</b> 找不到此管理員帳號識別碼。";
                        submitBtn.disabled = false;
                        submitBtn.innerText = "進入管理系統";
                    }
                })
                .catch(error => {
                    console.error("Firebase 登入通訊失敗:", error);
                    alertBox.className = "alert-box danger";
                    alertBox.innerHTML = `⚠️ <b>資料庫連線錯誤：</b> 請確認 Rules 規則或網路連線。`;
                    submitBtn.disabled = false;
                    submitBtn.innerText = "進入管理系統";
                });
            
            // 安全防呆清空密碼欄
            document.getElementById('adminPass').value = '';
        });

        // 處理【忘記密碼 - 查詢雲端繫結 Email】
        function sendAdminCode() {
            const user = document.getElementById('forgotAdminUser').value.trim();
            const email = document.getElementById('forgotAdminEmail').value.trim();
            const alertBox = document.getElementById('forgotAlert');

            if (!user || !email) {
                alertBox.className = "alert-box danger";
                alertBox.innerHTML = "⚠️ <b>欄位不完整：</b> 請輸入您的管理帳號與繫結信箱！";
                return;
            }

            db.ref('admin_users/' + user).once('value')
                .then(snapshot => {
                    if (snapshot.exists() && snapshot.val().email === email) {
                        alertBox.className = "alert-box success";
                        alertBox.innerHTML = `✉️ <b>比對成功！</b><br>已確認管理帳號與安全繫結信箱符合。<br>系統已發送臨時重設憑證至 <b>${email}</b>，請前往查看。`;
                    } else {
                        alertBox.className = "alert-box danger";
                        alertBox.innerHTML = "❌ <b>認證失敗：</b> 帳號不存在或與登記的官方繫結信箱不符！";
                    }
                })
                .catch(err => {
                    alertBox.className = "alert-box danger";
                    alertBox.innerHTML = "⚠️ <b>連線錯誤：</b> 無法存取雲端身分名冊。";
                });
        }
    </script>
</body>
</html>
