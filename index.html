<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📢 匿名光中 | 全新投稿系統</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script type="text/javascript">
        emailjs.init("Q-DqSh4FTyMFqBH38"); 
    </script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            position: relative;
        }

        .top-left-controls {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 10;
        }

        .login-btn, .help-btn {
            background-color: #ffffff;
            color: #4a90e2;
            border: 2px solid #4a90e2;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .login-btn { padding: 8px 16px; font-size: 14px; border-radius: 6px; }
        .help-btn { width: 35px; height: 35px; font-size: 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; padding: 0; }
        .login-btn:hover, .help-btn:hover { background-color: #4a90e2; color: white; }

        .logo-container { margin-top: 20px; margin-bottom: 10px; text-align: center; }
        .logo-container img { height: 60px; width: auto; max-width: 100%; }

        .container {
            max-width: 600px;
            width: 100%;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            box-sizing: border-box;
            margin-bottom: 40px;
        }

        h1 { color: #4a90e2; text-align: center; margin-bottom: 10px; }
        .notice { background-color: #eef5fc; border-left: 5px solid #4a90e2; padding: 15px; margin-bottom: 25px; border-radius: 4px; font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; }
        textarea, input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        textarea { height: 150px; resize: vertical; }
        
        .btn { width: 100%; background-color: #4a90e2; color: white; border: none; padding: 14px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: background 0.3s; }
        .btn:hover { background-color: #357abd; }
        
        .user-center-btn {
            display: none; 
            margin-top: 12px;
            background-color: #5cb85c;
        }
        .user-center-btn:hover { background-color: #4cae4c; }

        .email-input-group { display: flex; align-items: center; gap: 8px; }
        .email-suffix { font-size: 14px; color: #666; font-weight: bold; white-space: nowrap; background: #eee; padding: 12px; border-radius: 6px; border: 1px solid #ddd; }
        
        .verify-group { display: flex; gap: 10px; }
        .verify-btn { background: #5cb85c; color: white; border: none; padding: 0 15px; border-radius: 6px; cursor: pointer; white-space: nowrap; font-weight: bold; }
        .verify-btn:hover { background: #4cae4c; }
        .verify-btn:disabled { background: #ccc; cursor: not-allowed; }

        .footer-links { text-align: center; margin-top: 20px; font-size: 14px; }
        .footer-links a { color: #4a90e2; text-decoration: none; margin: 0 10px; }

        /* 磨砂玻璃燈箱外框層 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }

        .modal-card {
            background: #ffffff;
            width: 90%;
            max-width: 450px; 
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 20px 40px -5px rgba(0,0,0,0.15);
            box-sizing: border-box;
            position: relative;
            display: none; 
        }
        .modal-card.active { display: block; animation: slideUp 0.3s ease; }

        @keyframes slideUp {
            from { transform: translateY(25px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-close {
            position: absolute;
            top: 15px; right: 15px;
            font-size: 22px; color: #999;
            cursor: pointer; border: none; background: none;
        }
        .modal-close:hover { color: #333; }
        
        .modal-card h2 { color: #4a90e2; margin-top: 0; text-align: center; margin-bottom: 20px; }
        .modal-card .form-group { margin-bottom: 15px; }
        .modal-card input { padding: 10px; font-size: 15px; }
        
        .help-content-box {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 15px;
            font-size: 14px;
            line-height: 1.6;
            color: #4a5568;
            white-space: pre-wrap; 
            max-height: 300px;
            overflow-y: auto; 
        }

        /* 強制閱讀條款專屬滾動容器 */
        .notice-scroll-box {
            background-color: #fff9f0;
            border: 2px dashed #f59e0b;
            border-radius: 10px;
            padding: 18px;
            font-size: 14px;
            line-height: 1.6;
            color: #1e293b;
            white-space: pre-wrap;
            max-height: 240px;
            overflow-y: auto;
            margin-bottom: 15px;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.03);
        }

        /* 滾動解鎖按鈕防呆樣式 */
        .btn-lock {
            width: 100%;
            background-color: #cbd5e1;
            color: #94a3b8;
            border: none;
            padding: 14px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 8px;
            cursor: not-allowed;
            transition: all 0.2s ease;
        }
        .btn-lock.unlock {
            background-color: #4a90e2;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(74, 144, 226, 0.3);
        }
        .btn-lock.unlock:hover {
            background-color: #357abd;
        }

        .scroll-tip {
            font-size: 12px;
            color: #ef4444;
            text-align: center;
            margin-bottom: 12px;
            font-weight: 600;
            display: block;
        }

        .modal-sub-links { display: flex; justify-content: space-between; margin-top: 15px; font-size: 13px; }
        .modal-sub-links a { color: #4a90e2; text-decoration: none; cursor: pointer; }
        .modal-sub-links a:hover { text-decoration: underline; }

        @media (max-width: 768px) {
            body { padding: 10px; padding-top: 70px; }
            .top-left-controls { top: 10px; left: 10px; gap: 6px; }
            .login-btn { padding: 6px 12px; font-size: 13px; }
            .help-btn { width: 30px; height: 30px; font-size: 14px; }
            .logo-container img { height: 45px; }
            .container { padding: 20px; border-radius: 8px; }
            h1 { font-size: 24px; }
            .footer-links a { display: inline-block; margin: 5px 10px; }
            .modal-card { max-width: 95%; padding: 20px; }
            .email-suffix { padding: 10px; font-size: 12px; }
        }
    </style>
</head>
<body>

    <div class="top-left-controls">
        <button class="login-btn" id="loginBtn">🔑 登入</button>
        <button class="help-btn" id="helpBtn">?</button>
    </div>

    <div class="logo-container">
        <img src="logo.png" alt="學校 Logo">
    </div>

    <div class="container">
        <h1>匿名光中 2.0</h1>
        <p style="text-align: center; color: #666;">安全、直覺、全新的匿名交流空間</p>

        <div class="notice">
            <strong id="noticeTitle">正在讀取設定檔...</strong>
            <p id="noticeContent" style="margin: 5px 0 0 0; color: #666;">請稍候</p>
        </div>

        <form id="postForm">
            <div class="form-group">
                <label for="postContent">✍️ 投稿內容：</label>
                <textarea id="postContent" placeholder="請在此輸入你想說的話...（圖片將會自動生成）" required></textarea>
            </div>
            <button type="submit" class="btn">🚀 匿名送出投稿</button>
            
            <button type="button" class="btn user-center-btn" id="userCenterBtn" onclick="location.href='user.html'">🔒 進入個人會員中心</button>
        </form>

        <div class="footer-links">
            <a href="status.html">🔍 查詢投稿狀態</a>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        
        <div class="modal-card" id="cardForceNotice">
            <h2 id="forceNoticeTitle">⚠️ 投稿前請先閱讀規範</h2>
            <span class="scroll-tip" id="scrollTip">📜 請將規範滑動到最底部以解鎖按鈕</span>
            
            <div class="notice-scroll-box" id="forceNoticeBox" onscroll="handleNoticeScroll()">
                載入雲端公告條款中...
            </div>
            
            <button type="button" class="btn-lock" id="forceConfirmBtn" disabled onclick="submitPostToFirebase()">
                我已詳細閱讀並同意遵守上述規範
            </button>
        </div>

        <div class="modal-card" id="cardLogin">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <h2>🔑 用戶登入</h2>
            <form id="subFormLogin">
                <div class="form-group">
                    <label>使用者帳號 / 學號</label>
                    <input type="text" id="loginUser" placeholder="請輸入帳號或學號" required>
                </div>
                <div class="form-group">
                    <label>密碼</label>
                    <input type="password" id="loginPass" placeholder="請輸入密碼" required>
                </div>
                <button type="submit" class="btn" style="padding: 10px;">確認登入</button>
            </form>
            <div class="modal-sub-links">
                <a onclick="switchCard('cardForgot')">❓ 忘記密碼</a>
                <a onclick="switchCard('cardRegister')">✨ 註冊新帳號</a>
            </div>
        </div>

        <div class="modal-card" id="cardForgot">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <h2>❓ 找回密碼</h2>
            <form id="subFormForgot">
                <div class="form-group">
                    <label>學校電子郵件</label>
                    <div class="email-input-group">
                        <input type="text" id="forgotEmailPrefix" placeholder="學號/帳號" required>
                        <span class="email-suffix">@ms.gmjh.tyc.edu.tw</span>
                    </div>
                </div>
                <div class="form-group">
                    <label>驗證碼</label>
                    <div class="verify-group">
                        <input type="text" id="forgotVerifyCode" placeholder="請輸入驗證碼" required>
                        <button type="button" class="verify-btn" id="forgotCodeBtn" onclick="sendCode('forgot')">發送驗證碼</button>
                    </div>
                </div>
                <button type="submit" class="btn" style="padding: 10px; background-color: #5cb85c;">驗證並送出</button>
            </form>
            <div class="modal-sub-links">
                <a onclick="switchCard('cardLogin')">⬅️ 返回登入</a>
            </div>
        </div>

        <div class="modal-card" id="cardRegister">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <h2>✨ 註冊帳號</h2>
            <form id="subFormRegister">
                <div class="form-group">
                    <label>用戶名稱 (暱稱)</label>
                    <input type="text" id="regName" placeholder="例如：gmjh123" required>
                </div>
                <div class="form-group">
                    <label>學校電子郵件</label>
                    <div class="email-input-group">
                        <input type="text" id="regEmailPrefix" placeholder="請輸入學號" required>
                        <span class="email-suffix">@ms.gmjh.tyc.edu.tw</span>
                    </div>
                </div>
                <div class="form-group">
                    <label>驗證碼</label>
                    <div class="verify-group">
                        <input type="text" id="regVerifyCode" placeholder="請輸入驗證碼" required>
                        <button type="button" class="verify-btn" id="regCodeBtn" onclick="sendCode('reg')">發送驗證碼</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>設定密碼</label>
                    <input type="password" id="regPass" placeholder="須包含小寫字母與數字" required>
                </div>
                <div class="form-group">
                    <label>再次確認密碼</label>
                    <input type="password" id="regPassConfirm" placeholder="請再次輸入密碼" required>
                </div>
                <button type="submit" class="btn" style="padding: 10px;">提交註冊</button>
            </form>
            <div class="modal-sub-links">
                <a onclick="switchCard('cardLogin')">⬅️ 已有帳號？去登入</a>
            </div>
        </div>

        <div class="modal-card" id="cardHelp">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <h2 id="modalHelpTitle">💡 使用幫助</h2>
            <div class="help-content-box" id="modalHelpContent">
                說明載入中...
            </div>
            <button class="btn" style="padding: 10px; margin-top: 15px;" onclick="closeModal()">我知道了</button>
        </div>

    </div>

    <script>
        // --- Firebase 配置 ---
        const firebaseConfig = {
            apiKey: "AIzaSyCENccafho6fKD0IefzsQPiXjAq0tpk3NU",
            authDomain: "gmservice-80d0d.firebaseapp.com",
            databaseURL: "https://gmservice-80d0d-default-rtdb.firebaseio.com",
            projectId: "gmservice-80d0d",
            storageBucket: "gmservice-80d0d.firebasestorage.app",
            messagingSenderId: "776618303417",
            appId: "1:776618303417:web:7e5e0a4eff964413a2a068"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let configData = {};
        let generatedCode = ""; 
        let tempPostContent = ""; // 暫存等待發布的內文

        function updateLoginStateUI() {
            const currentUser = sessionStorage.getItem('currentUser');
            const loginBtn = document.getElementById('loginBtn');
            const userCenterBtn = document.getElementById('userCenterBtn');
            
            if (currentUser) {
                loginBtn.innerText = `👤 ${currentUser} (登出)`;
                loginBtn.style.borderColor = "#5cb85c";
                loginBtn.style.color = "#5cb85c";
                userCenterBtn.style.display = "block"; 
            } else {
                loginBtn.innerText = "🔑 登入";
                loginBtn.style.borderColor = "#4a90e2";
                loginBtn.style.color = "#4a90e2";
                userCenterBtn.style.display = "none"; 
            }
        }

        // 串接 Firebase 的系統公告
        function loadConfig() {
            updateLoginStateUI(); 
            
            db.ref('system_notice').on('value', (snapshot) => {
                if(snapshot.exists()) {
                    const data = snapshot.val();
                    document.getElementById('noticeTitle').innerText = `📢 ${data.title} (發布時間: ${data.timestamp})`;
                    document.getElementById('noticeContent').innerText = data.content;
                    
                    document.getElementById('forceNoticeBox').innerText = `【公告標題：${data.title}】\n\n${data.content}\n\n------------------------------\n💡 系統投稿防範提示：\n1. 請勿包含任何人身攻擊、不實謠言、個資洩漏或違反校規之爭議內容。\n2. 本站採用去識別化安全金鑰，後台審核小編絕對無法追溯您的實際帳號身分。\n3. 送出投稿即代表您願意對自己的言論負起完全法律責任。`;
                } else {
                    const fallbackTitle = "📢 投稿規範與維護公告：";
                    const fallbackContent = "請勿包含人身攻擊、洩漏個資或違反校規之內容。";
                    document.getElementById('noticeTitle').innerText = fallbackTitle;
                    document.getElementById('noticeContent').innerText = fallbackContent;
                    document.getElementById('forceNoticeBox').innerText = `${fallbackTitle}\n\n${fallbackContent}`;
                }
            });

            configData = {
                "helpTitle": "💡 匿名光中 2.0 使用幫助",
                "helpContent": "1. 為什麼要登入？\n登入後可解鎖更多校園專屬功能與狀態查詢。\n\n2. 匿名性保證：\n本站採用去識別化技術，小編與後台絕對無法查閱您的投稿身分，請安心發言！"
            };
        }
        window.onload = loadConfig;

        const overlay = document.getElementById('modalOverlay');
        
        document.getElementById('loginBtn').addEventListener('click', () => {
            if (sessionStorage.getItem('currentUser')) {
                if (confirm("確定要登出帳號嗎？")) {
                    sessionStorage.removeItem('currentUser');
                    updateLoginStateUI(); 
                    alert("已成功登出！");
                }
                return;
            }
            overlay.classList.add('active');
            switchCard('cardLogin');
        });

        document.getElementById('helpBtn').addEventListener('click', () => {
            document.getElementById('modalHelpTitle').innerText = configData.helpTitle;
            document.getElementById('modalHelpContent').innerText = configData.helpContent;
            overlay.classList.add('active');
            switchCard('cardHelp');
        });

        // 點擊外框關閉燈箱（若為強制閱讀公告，禁止隨意點擊外部關閉）
        overlay.addEventListener('click', (e) => {
            const activeCard = document.querySelector('.modal-card.active');
            if(e.target === overlay && activeCard && activeCard.id !== 'cardForceNotice') {
                closeModal();
            }
        });

        function closeModal() {
            overlay.classList.remove('active');
        }

        function switchCard(cardId) {
            document.querySelectorAll('.modal-card').forEach(card => card.classList.remove('active'));
            document.getElementById(cardId).classList.add('active');
        }

        // 🌟 核心修正：自動檢查公告內容高度是否短到「不需要滑動」
        function checkIfScrollRequired() {
            const box = document.getElementById('forceNoticeBox');
            const btn = document.getElementById('forceConfirmBtn');
            const tip = document.getElementById('scrollTip');
            
            // 如果實際總高度小於或等於容器高度（外加 5 像素相容小誤差），代表無須捲動
            if (box.scrollHeight <= box.clientHeight + 5) {
                btn.disabled = false;
                btn.classList.add('unlock');
                tip.innerText = "✅ 本期公告較短，您已閱讀完畢，可直接點擊下方按鈕投稿";
                tip.style.color = "#10b981";
            }
        }

        // 🌟 即時偵測用戶的公告捲軸是否滑動到最底部
        function handleNoticeScroll() {
            const box = document.getElementById('forceNoticeBox');
            const btn = document.getElementById('forceConfirmBtn');
            const tip = document.getElementById('scrollTip');
            
            const isBottom = (box.scrollHeight - box.scrollTop <= box.clientHeight + 5);
            
            if (isBottom) {
                btn.disabled = false;
                btn.classList.add('unlock');
                tip.innerText = "✅ 條款已閱讀完畢，可點擊下方按鈕送出投稿";
                tip.style.color = "#10b981";
            }
        }

        function sendCode(type) {
            let prefix = type === 'reg' ? document.getElementById('regEmailPrefix').value : document.getElementById('forgotEmailPrefix').value;
            let btn = type === 'reg' ? document.getElementById('regCodeBtn') : document.getElementById('forgotCodeBtn');
            
            if(!prefix) {
                alert("請先輸入學校信箱帳號/學號！");
                return;
            }
            
            let fullEmail = prefix + "@ms.gmjh.tyc.edu.tw";
            generatedCode = Math.floor(100000 + Math.random() * 900000).toString();
            
            btn.disabled = true;
            btn.innerText = "發送中...";

            const templateParams = {
                email: fullEmail,
                code: generatedCode
            };

            emailjs.send('gmservice', 'template_kii7aak', templateParams)
                .then(function(response) {
                    alert(`【驗證碼系統】\n已成功將驗證碼發送到：\n${fullEmail}\n\n請前往您的學校 Gmail 收信！`);
                    
                    let countdown = 60;
                    btn.innerText = `重新發送 (${countdown}s)`;
                    let timer = setInterval(() => {
                        countdown--;
                        btn.innerText = `重新發送 (${countdown}s)`;
                        if (countdown <= 0) {
                            clearInterval(timer);
                            btn.disabled = false;
                            btn.innerText = "發送驗證碼";
                        }
                    }, 1000);

                }, function(error) {
                    alert("❌ 驗證碼發送失敗，請檢查 EmailJS 設定。");
                    console.error('EmailJS 錯誤:', error);
                    btn.disabled = false;
                    btn.innerText = "發送驗證碼";
                });
        }

        // 登入驗證
        document.getElementById('subFormLogin').addEventListener('submit', function(e) {
            e.preventDefault();
            const inputUser = document.getElementById('loginUser').value;
            const inputPass = document.getElementById('loginPass').value;
            
            db.ref('passuser/' + inputUser).once('value')
                .then((snapshot) => {
                    if (snapshot.exists()) {
                        const userData = snapshot.val();
                        if (userData.regPass === inputPass) {
                            executeLoginSuccess(inputUser);
                            return true;
                        }
                    }
                    return db.ref('passuser').orderByChild('regEmailPrefix').equalTo(inputUser).once('value');
                })
                .then((snapshot) => {
                    if (snapshot === true) return true;

                    if (snapshot && snapshot.exists()) {
                        let userData = Object.values(snapshot.val())[0];
                        if (userData.regPass === inputPass) {
                            executeLoginSuccess(userData.regName);
                            return true;
                        }
                    }
                    return fetch('./pass.json');
                })
                .then(response => {
                    if (response === true) return true;
                    if (!response || !response.ok) throw new Error();
                    return response.json();
                })
                .then(accountData => {
                    if (accountData === true) return;
                    
                    if (accountData && inputUser === accountData.adminUser && inputPass === accountData.adminPass) {
                        executeLoginSuccess(inputUser);
                    } else {
                        showLoginError("您輸入的帳號或密碼不正確，請重新檢查。");
                    }
                })
                .catch(error => {
                    if (error && error.message !== "SUCCESS") {
                        showLoginError("帳號密碼不正確，或 Firebase 雲端連線失敗。");
                    }
                });
            
            document.getElementById('loginPass').value = '';
        });

        function executeLoginSuccess(username) {
            sessionStorage.setItem('currentUser', username);
            updateLoginStateUI(); 
            
            const loginSubmitBtn = document.querySelector('#subFormLogin button[type="submit"]');
            if(loginSubmitBtn) {
                loginSubmitBtn.innerText = "🎉 登入成功！";
                loginSubmitBtn.style.backgroundColor = "#5cb85c";
                loginSubmitBtn.disabled = true;
            }
            
            setTimeout(() => { 
                closeModal(); 
                if(loginSubmitBtn) {
                    loginSubmitBtn.innerText = "確認登入";
                    loginSubmitBtn.style.backgroundColor = "#4a90e2";
                    loginSubmitBtn.disabled = false;
                }
            }, 600);
        }

        function showLoginError(msg) {
            document.getElementById('modalHelpTitle').innerText = "❌ 登入失敗";
            document.getElementById('modalHelpContent').innerText = msg;
            switchCard('cardHelp');
        }

        document.getElementById('subFormForgot').addEventListener('submit', function(e) {
            e.preventDefault();
            const inputCode = document.getElementById('forgotVerifyCode').value;
            if (generatedCode === "" || inputCode !== generatedCode) {
                alert("❌ 驗證碼錯誤或尚未發送！");
                return;
            }
            alert(`🎉 驗證碼成功！新密碼重設信已發送！`);
            generatedCode = ""; 
            switchCard('cardLogin');
        });

        // 註冊表單
        document.getElementById('subFormRegister').addEventListener('submit', function(e) {
            e.preventDefault();
            const regName = document.getElementById('regName').value;
            const regEmailPrefix = document.getElementById('regEmailPrefix').value;
            const pass = document.getElementById('regPass').value;
            const passConfirm = document.getElementById('regPassConfirm').value;
            const inputCode = document.getElementById('regVerifyCode').value;
            
            const nameRegex = /^[a-zA-Z0-9]+$/;
            if (!nameRegex.test(regName)) {
                alert("❌ 錯誤：用戶名稱只能包含英文字母與數字！");
                return;
            }

            const passRegex = /^(?=.*[a-z])(?=.*\d).+$/;
            if (!passRegex.test(pass)) {
                alert("❌ 錯誤：密碼必須同時包含小寫字母與數字！");
                return;
            }

            if(pass !== passConfirm) {
                alert("❌ 錯誤：兩次輸入的密碼不一致！");
                return;
            }
            if (generatedCode === "" || inputCode !== generatedCode) {
                alert("❌ 驗證碼錯誤或尚未發送！");
                return;
            }

            db.ref('passuser/' + regName).once('value').then((snapshot) => {
                if (snapshot.exists()) {
                    alert("❌ 錯誤：此用戶名稱已被註冊，請換一個！");
                    return;
                }
                
                return db.ref('passuser/' + regName).set({
                    "regName": regName,
                    "regEmailPrefix": regEmailPrefix,
                    "regPass": pass,
                    "signupTime": new Date().toLocaleString()
                });
            }).then(() => {
                alert(`🎉 註冊成功！您可以直接在左上角進行登入了！`);
                generatedCode = ""; 
                switchCard('cardLogin');
            }).catch((err) => {
                alert("❌ 寫入雲端失敗，請確認 Firebase 權限。");
                console.error(err);
            });
        });
        
        // 攔截點擊事件，進行身分驗證並強推公告視窗
        document.getElementById('postForm').addEventListener('submit', function(event) {
            event.preventDefault();
            
            const postContent = document.getElementById('postContent').value.trim();
            const currentUser = sessionStorage.getItem('currentUser');
            
            if (!currentUser) {
                alert("🔒 投稿系統為校內專屬，請先點擊左上角「🔑 登入」或註冊新帳號！");
                return;
            }

            if (!postContent) {
                alert("請輸入投稿內容！");
                return;
            }

            // 1. 暫存貼文內容並初始化解鎖按鈕
            tempPostContent = postContent;
            
            const confirmBtn = document.getElementById('forceConfirmBtn');
            const tip = document.getElementById('scrollTip');
            const scrollBox = document.getElementById('forceNoticeBox');
            
            confirmBtn.disabled = true;
            confirmBtn.classList.remove('unlock');
            tip.innerText = "📜 請將規範滑動到最底部以解鎖按鈕";
            tip.style.color = "#ef4444";
            scrollBox.scrollTop = 0; // 重設捲軸到最上方

            // 2. 開啟燈箱並引導用戶到強制閱讀區
            overlay.classList.add('active');
            switchCard('cardForceNotice');

            // 🌟 核心修正：過 100 毫秒燈箱過渡完畢後，立刻判斷該公告是否免滑動解鎖
            setTimeout(checkIfScrollRequired, 100);
        });

        // 完全看完了，點下「已詳細閱讀」按鈕後的真實送出函式
        function submitPostToFirebase() {
            if (!tempPostContent) return;

            const currentUser = sessionStorage.getItem('currentUser');
            const submitBtn = document.getElementById('forceConfirmBtn');
            
            submitBtn.disabled = true;
            submitBtn.innerText = "安全遞交數據中...";

            db.ref('post_counter').transaction((currentCount) => {
                return (currentCount || 0) + 1;
            }, (error, committed, snapshot) => {
                if (error) {
                    alert('❌ 資料庫對接失敗，請確認 Firebase Rules 讀寫權限。');
                    submitBtn.disabled = false;
                    submitBtn.innerText = "我已詳細閱讀並同意遵守上述規範";
                    return;
                }

                if (committed) {
                    const nextNumber = snapshot.val();
                    const customPostId = "gm" + String(nextNumber).padStart(3, '0');

                    const newPostData = {
                        postId: "#" + customPostId,
                        username: currentUser,
                        content: tempPostContent,
                        timestamp: new Date().toLocaleString('zh-TW'),
                        status: "pending"
                    };

                    db.ref('posts/' + customPostId).set(newPostData)
                        .then(() => {
                            alert(`🎉 投稿成功！您的專屬投稿編號為：#${customPostId}\n已安全送至雲端審核中心。`);
                            document.getElementById('postContent').value = ''; 
                            tempPostContent = ""; // 清空暫存
                            closeModal();
                        })
                        .catch((err) => {
                            alert('❌ 投稿寫入失敗，請檢查權限。');
                            console.error(err);
                        })
                        .finally(() => {
                            submitBtn.disabled = false;
                            submitBtn.innerText = "我已詳細閱讀並同意遵守上述規範";
                        });
                }
            });
        }
    </script>
</body>
</html>
